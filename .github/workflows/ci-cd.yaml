name: CI-CD for GPS Classroom Service

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gps-classroom-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/gps-classroom-service:${{ github.sha }}

  cd:
    needs: ci
    if: github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify kubectl access
        run: kubectl get nodes

      - name: Update deployment image
        run: |
          kubectl set image deployment/gps-classroom-deployment \
            gps-classroom-container=${{ secrets.DOCKERHUB_USERNAME }}/gps-classroom-service:${{ github.sha }}

      - name: Verify rollout
        run: kubectl rollout status deployment/gps-classroom-deployment
        