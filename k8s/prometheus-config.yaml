apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'gps-classroom-service'
        metrics_path: /metrics
        static_configs:
          - targets: ['gps-classroom-service.default.svc.cluster.local:80']